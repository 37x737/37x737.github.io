<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>야구 감독 시뮬레이터</title>

<style>
body{
    background:#1b1b1b;
    color:white;
    font-family:Arial;
    margin:20px;
}

h1{
    text-align:center;
}

.container{
    display:flex;
    gap:20px;
}

.panel{
    background:#2b2b2b;
    padding:15px;
    border-radius:10px;
    flex:1;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #555;
    padding:6px;
    text-align:center;
}

#log{
    height:400px;
    overflow-y:auto;
    background:black;
    padding:10px;
}
</style>
</head>
<body>

<h1>야구 감독 시뮬레이터</h1>

<button onclick="playGame()">경기 시작</button>

<h2 id="score">0 : 0</h2>

<div class="container">

<div class="panel">
<h3>선수단</h3>

<table>
<thead>
<tr>
<th>이름</th>
<th>타격</th>
<th>출루</th>
<th>장타</th>
<th>안타</th>
<th>홈런</th>
</tr>
</thead>

<tbody id="roster"></tbody>
</table>
</div>

<div class="panel">
<h3>경기 로그</h3>
<div id="log"></div>
</div>

</div>

<script>

const names = [
"김민수","박지훈","이준호",
"최도윤","정우진","강현우",
"한서준","윤지호","송예찬"
];

let team = [];

function createPlayers(){

team=[];

for(let i=0;i<9;i++){

team.push({
name:names[i],
hit:50+Math.floor(Math.random()*50),
obp:50+Math.floor(Math.random()*50),
power:50+Math.floor(Math.random()*50),

hits:0,
hr:0,
ab:0
});

}

renderRoster();

}

function renderRoster(){

let html="";

team.forEach(p=>{

html+=`
<tr>
<td>${p.name}</td>
<td>${p.hit}</td>
<td>${p.obp}</td>
<td>${p.power}</td>
<td>${p.hits}</td>
<td>${p.hr}</td>
</tr>
`;

});

document.getElementById("roster").innerHTML=html;

}

function log(text){

const div=document.getElementById("log");

div.innerHTML+=text+"<br>";

div.scrollTop=div.scrollHeight;

}

function atBat(player){

player.ab++;

let r=Math.random()*100;

if(r<player.power*0.08){

player.hr++;
player.hits++;

return "HR";

}

if(r<player.hit){

player.hits++;

return "H";

}

return "OUT";

}

function playGame(){

document.getElementById("log").innerHTML="";

let score=0;

let batter=0;

for(let inning=1;inning<=9;inning++){

let outs=0;

let runners=[false,false,false];

log(`<b>${inning}회 시작</b>`);

while(outs<3){

let p=team[batter];

let result=atBat(p);

if(result==="OUT"){

outs++;

log(`${p.name} 아웃 (${outs}아웃)`);

}else if(result==="H"){

let runs=0;

if(runners[2]){
runs++;
runners[2]=false;
}

runners[2]=runners[1];
runners[1]=runners[0];
runners[0]=true;

score+=runs;

log(`${p.name} 안타`);

if(runs>0){
log(`${runs}점 득점`);
}

}else{

let runs=1;

for(let i=0;i<3;i++){

if(runners[i]) runs++;

}

score+=runs;

runners=[false,false,false];

log(`💥 ${p.name} 홈런 (+${runs}점)`);

}

batter++;

if(batter>=9) batter=0;

}

}

document.getElementById("score").innerText=
`${score} : 상대팀 ${Math.floor(Math.random()*10)}`;

renderRoster();

}

createPlayers();

</script>

</body>
</html>
